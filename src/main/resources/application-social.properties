# 第三方登录配置

## 微信登录配置
WECHAT_APP_ID=your_wechat_app_id
WECHAT_APP_SECRET=your_wechat_app_secret
WECHAT_REDIRECT_URI=http://localhost:5173/login/wechat/callback

## QQ登录配置
QQ_APP_ID=your_qq_app_id
QQ_APP_KEY=your_qq_app_key
QQ_REDIRECT_URI=http://localhost:5173/login/qq/callback

## 注意事项
# 1. 需要在微信开放平台注册应用并获取AppID和AppSecret
# 2. 需要在QQ互联平台注册应用并获取AppID和AppKey
# 3. 需要配置正确的回调地址(redirect_uri)
# 4. 生产环境请妥善保管这些敏感信息，不要提交到代码仓库