# ============================================
# 第三方登录配置
# ============================================

# 微信登录配置
social.login.wechat.app-id=your_wechat_app_id
social.login.wechat.app-secret=your_wechat_app_secret
social.login.wechat.redirect-uri=http://localhost:5173/oauth/wechat/callback

# QQ登录配置
social.login.qq.app-id=your_qq_app_id
social.login.qq.app-key=your_qq_app_key
social.login.qq.redirect-uri=http://localhost:5173/oauth/qq/callback

# ============================================
# 注意事项
# ============================================
# 1. 需要在微信开放平台注册应用并获取AppID和AppSecret
#    地址: https://open.weixin.qq.com/
# 
# 2. 需要在QQ互联平台注册应用并获取AppID和AppKey
#    地址: https://connect.qq.com/
# 
# 3. 需要配置正确的回调地址(redirect-uri)
#    - 微信: 在微信开放平台配置授权回调域
#    - QQ: 在QQ互联平台配置回调地址
# 
# 4. 生产环境请妥善保管这些敏感信息
#    - 不要将真实配置提交到代码仓库
#    - 建议使用环境变量或配置中心管理
#    - 例如: ${WECHAT_APP_ID} 从环境变量读取
# 
# 5. 本地开发测试建议使用内网穿透工具
#    - ngrok: https://ngrok.com/
#    - 花生壳: https://hsk.oray.com/
