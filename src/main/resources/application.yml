spring:
  application:
    name: user-center
    jackson:
      date-format: yyyy-MM-dd
      time-zone: Asia/Shanghai
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
    url: jdbc:mysql://localhost:3306/zzkkyy?serverTimezone=Asia/Shanghai
  session:
    timeout: 86400
  devtools:
    restart:
      enabled: false
  data:
    redis:
      port: 6379
      host: localhost
      database: 1

server:
  port: 8080
  # context-path 已注释，使用根路径以避免前端路由冲突
  # servlet:
  #   context-path: /api
  session:
    cookie:
      domain: localhost
  # 禁用 JSP 支持，避免与 Spring Boot 3.x 冲突
  jsp:
    register-servlet: false
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1 #逻辑已删除默认为1
      logic-not-delete-value: 0 #逻辑未删除默认为0
springdoc:
  swagger-ui:
    #自定义swagger前端请求路径,输入http:localhost:8080/swagger-ui会自动重定向到swagger页面
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs  #swagger后端请求地址
    enabled: true   #是否开启文档功能
  group-configs: #分组配置,可配置多个分组
    - group: 'default'             #分组名称
      paths-to-match: '/**'        #配置需要匹配的路径
      packages-to-scan: com.zzkkyy.usercenter    #配置要扫描包的路径,一般配置到启动类所在的包名
    - group: 'admin-api'
      paths-to-match: '/**'
      packages-to-scan: com.zzkkyy.usercenter
knife4j:
  enable: true    #开启knife4j,无需添加@EnableKnife4j注解
  setting:
    language: zh_cn   #中文
    swagger-model-name: 实体列表   #默认为：Swagger Models
  #开启Swagger的Basic认证功能,默认是false,开启后访问文档页面时会弹出用户名和密码输入框
  basic:
    enable: true
    # Basic认证用户名
    username: user
    # Basic认证密码
    password: 123456

# 爬虫配置
crawler:
  enabled: true
  target-urls: http://quotes.toscrape.com/
  thread-count: 5          # 增加并发线程数（从2改为5）
  retry-times: 2           # 减少重试次数（从3改为2）
  sleep-time: 500          # 减少请求间隔（从1000ms改为500ms）

# Hive 配置
hive:
  jdbc:
    url: jdbc:hive2://192.168.26.202:10000/default
    username: 
    password: 